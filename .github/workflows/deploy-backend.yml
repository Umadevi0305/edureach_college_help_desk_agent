name: Deploy Backend (Lambda)

on:
  push:
    branches: [main]
    paths: ["server/**", ".github/workflows/deploy-backend.yml"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Build deployment package
        run: zip -r ../function.zip . -x ".env" -x ".git/*"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload package to S3
        run: aws s3 cp ../function.zip "s3://${{ secrets.ARTIFACTS_BUCKET }}/function.zip"

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name edureach-api \
            --s3-bucket "${{ secrets.ARTIFACTS_BUCKET }}" \
            --s3-key function.zip
